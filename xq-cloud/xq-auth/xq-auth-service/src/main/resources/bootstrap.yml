server:
  port: 8081  #端口
  tomcat:
    uri-encoding: UTF-8   #服务编码
spring:
  profiles:
    active: dev
  application:
    name: auth-service
  cloud:
    nacos:
      config:
        file-extension: yaml
        shared-configs: # 共享配置
          - data-id: shared-spring.yaml # 共享spring配置
            refresh: false
          - data-id: shared-redis.yaml # 共享redis配置
            refresh: false
          - data-id: shared-mybatis.yaml # 共享mybatis配置
            refresh: false
          - data-id: shared-logs.yaml # 共享日志配置
            refresh: false
xq:
  swagger:
    enable: true
    enableResponseWrap: true
    package-path: com.share.auth.controller
    title: xq-cloud - 权限微服务接口文档
    description: 该服务用于管理权限相关信息
    contact-name: IT_IOS_MAN
    contact-url: https://github.com/IT-IOS-MAN/xq-cloud
    contact-email: 917709989@qq.com
    version: v1.0
  auth:
    resource:
      enable: true
      includeLoginPaths:
        - /menus/me
        - /accounts/logout
  jdbc:
    database: xq_auth